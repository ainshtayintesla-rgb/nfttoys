apiVersion: v1
kind: PersistentVolume
metadata:
  name: userbot-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /var/lib/nfttoys/userbot_data
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: userbot-pvc
  namespace: nfttoys-prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: userbot
  namespace: nfttoys-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: userbot
  strategy:
    type: Recreate   # only one authenticated Telegram userbot session should run at once
  template:
    metadata:
      labels:
        app: userbot
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: userbot
          image: ghcr.io/ainshtayintesla-rgb/nfttoys/userbot:latest
          ports:
            - containerPort: 8095
          envFrom:
            - secretRef:
                name: nfttoys-secrets
          env:
            - name: USERBOT_PORT
              value: "8095"
            - name: SESSION_DIR
              value: /app/data/sessions
          volumeMounts:
            - name: userbot-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8095
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8095
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: userbot-data
          persistentVolumeClaim:
            claimName: userbot-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: userbot
  namespace: nfttoys-prod
spec:
  selector:
    app: userbot
  ports:
    - port: 8095
      targetPort: 8095
