apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: nfttoys-prod
  annotations:
    # Used by CI to track deployed image
    deployment.kubernetes.io/image: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     # never kill old pod before new one is Ready
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        # Run prisma migrate before the server starts
        - name: migrate
          image: ghcr.io/ainshtayintesla-rgb/nfttoys/api:latest
          command: ["npm", "run", "prisma:migrate"]
          envFrom:
            - secretRef:
                name: nfttoys-secrets
            - configMapRef:
                name: nfttoys-config
      containers:
        - name: api
          image: ghcr.io/ainshtayintesla-rgb/nfttoys/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: nfttoys-secrets
            - configMapRef:
                name: nfttoys-config
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: BOT_SERVICE_URL
              value: http://bot.nfttoys-prod.svc.cluster.local:8090/internal/notify/nft-received
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: nfttoys-prod
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30100     # nginx → 127.0.0.1:30100
