apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: nfttoys-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     # never kill old pod before new one is Ready
  template:
    metadata:
      labels:
        app: web
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: web
          image: ghcr.io/ainshtayintesla-rgb/nfttoys/web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: nfttoys-secrets
            - configMapRef:
                name: nfttoys-config
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: nfttoys-prod
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30101     # nginx → 127.0.0.1:30101
