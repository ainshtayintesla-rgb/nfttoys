name: Deploy Bots (Bot + Userbot)

on:
  push:
    branches:
      - main
    paths:
      - 'bot/**'
      - 'userbot/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build Bot + Userbot Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha-tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Bot image
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          file: ./bot/Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfttoys/bot:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ github.repository_owner }}/nfttoys/bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Userbot image
        uses: docker/build-push-action@v5
        with:
          context: ./userbot
          file: ./userbot/Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfttoys/userbot:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ github.repository_owner }}/nfttoys/userbot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Bots to k3s
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            TAG="${{ needs.build-and-push.outputs.image-tag }}"
            OWNER="${{ github.repository_owner }}"
            NS="nfttoys-prod"
            REPO="/root/my-works/nfttoys-pro"

            echo "=== Syncing manifests ==="
            git -C "$REPO" fetch origin main
            git -C "$REPO" reset --hard origin/main

            echo "=== Rolling update to $TAG ==="
            kubectl set image deployment/bot bot=ghcr.io/${OWNER}/nfttoys/bot:${TAG} -n $NS
            kubectl set image deployment/userbot userbot=ghcr.io/${OWNER}/nfttoys/userbot:${TAG} -n $NS

            echo "=== Waiting for rollout ==="
            kubectl rollout status deployment/bot -n $NS --timeout=3m
            kubectl rollout status deployment/userbot -n $NS --timeout=3m

            echo "=== Smoke check ==="
            kubectl exec deployment/userbot -n $NS -- python - <<'PY'
            import json
            import urllib.request

            with urllib.request.urlopen("http://127.0.0.1:8095/health", timeout=10) as response:
                payload = json.load(response)

            assert payload.get("status") == "ok", payload
            print("  ✓ userbot /health", payload)
            PY

            echo "=== Deploy complete: $TAG ==="
