name: Build and Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha-tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          target: runtime
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfttoys/api:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ github.repository_owner }}/nfttoys/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          target: runtime
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_BOT_USERNAME=${{ secrets.NEXT_PUBLIC_BOT_USERNAME }}
            NEXT_PUBLIC_ADMIN_IDS=${{ secrets.NEXT_PUBLIC_ADMIN_IDS }}
            NEXT_PUBLIC_TG_GROUP=${{ secrets.NEXT_PUBLIC_TG_GROUP }}
            NEXT_PUBLIC_TG_CHANNEL=${{ secrets.NEXT_PUBLIC_TG_CHANNEL }}
            NEXT_PUBLIC_WALLET_NETWORK=${{ secrets.NEXT_PUBLIC_WALLET_NETWORK }}
            NEXT_PUBLIC_WALLET_V2_NETWORK=${{ secrets.NEXT_PUBLIC_WALLET_V2_NETWORK }}
            TOKEN_SECRET=${{ secrets.TOKEN_SECRET }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfttoys/web:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ github.repository_owner }}/nfttoys/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Bot image
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          file: ./bot/Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfttoys/bot:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ github.repository_owner }}/nfttoys/bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Userbot image
        uses: docker/build-push-action@v5
        with:
          context: ./userbot
          file: ./userbot/Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfttoys/userbot:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ github.repository_owner }}/nfttoys/userbot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to k3s
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            TAG="${{ needs.build-and-push.outputs.image-tag }}"
            OWNER="${{ github.repository_owner }}"
            NS="nfttoys-prod"
            REPO="/root/my-works/nfttoys-pro"

            echo "=== Syncing manifests ==="
            git -C "$REPO" fetch origin main
            git -C "$REPO" reset --hard origin/main

            echo "=== Refreshing prod secrets ==="
            bash "$REPO/scripts/k8s-create-secrets.sh" "$REPO"

            echo "=== Applying k8s manifests ==="
            kubectl apply -f "$REPO/k8s/prod/"

            echo "=== Rolling update to $TAG ==="
            kubectl set image deployment/api api=ghcr.io/${OWNER}/nfttoys/api:${TAG} -n $NS
            kubectl set image deployment/web web=ghcr.io/${OWNER}/nfttoys/web:${TAG} -n $NS
            kubectl set image deployment/bot bot=ghcr.io/${OWNER}/nfttoys/bot:${TAG} -n $NS
            kubectl set image deployment/userbot userbot=ghcr.io/${OWNER}/nfttoys/userbot:${TAG} -n $NS
            kubectl set image deployment/api migrate=ghcr.io/${OWNER}/nfttoys/api:${TAG} -n $NS

            echo "=== Waiting for rollout ==="
            kubectl rollout status deployment/web -n $NS --timeout=5m
            kubectl rollout status deployment/bot -n $NS --timeout=5m
            kubectl rollout status deployment/userbot -n $NS --timeout=5m
            kubectl rollout status deployment/api -n $NS --timeout=5m

            echo "=== Smoke check ==="
            API="http://127.0.0.1:30100"
            WEB="http://127.0.0.1:30101"
            check() {
              local url=$1 expected=$2 label=$3
              local code
              code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
              if [ "$code" = "$expected" ]; then
                echo "  ✓ $label ($code)"
              else
                echo "  ✗ $label — expected $expected, got $code" && exit 1
              fi
            }
            check_origin() {
              local url=$1 origin=$2 expected=$3 label=$4
              local code
              code=$(curl -s -o /dev/null -w "%{http_code}" -H "Origin: $origin" "$url")
              if [ "$code" = "$expected" ]; then
                echo "  ✓ $label ($code)"
              else
                echo "  ✗ $label — expected $expected, got $code" && exit 1
              fi
            }
            check "$API/health" 200 "api /health"
            check "$API/v2/wallets" 401 "api /v2/wallets (auth required)"
            check "$API/wallet/info" 401 "api /wallet/info (auth required)"
            check "$WEB/" 200 "web /"
            check "$WEB/profile" 200 "web /profile"
            check "$WEB/wallet" 200 "web /wallet"
            check "$WEB/wallet-v2" 200 "web /wallet-v2"
            check "$WEB/transactions" 200 "web /transactions"
            check "$WEB/admin" 200 "web /admin"
            check_origin "$API/health" "https://nfttoys.shop" 200 "api CORS apex"
            check_origin "$API/health" "https://www.nfttoys.shop" 200 "api CORS www"

            echo "=== Auth smoke check ==="
            SMOKE_TELEGRAM_ID="990$(date +%s)"
            AUTH_TOKEN="$(
              kubectl exec deployment/api -n $NS -- sh -lc "
                SMOKE_TELEGRAM_ID='$SMOKE_TELEGRAM_ID' node - <<'NODE'
                const crypto = require('crypto');
                (async () => {
                  const userId = Number(process.env.SMOKE_TELEGRAM_ID);
                  const params = new URLSearchParams();
                  params.set('auth_date', String(Math.floor(Date.now() / 1000)));
                  params.set('query_id', 'smoke-check');
                  params.set('user', JSON.stringify({
                    id: userId,
                    first_name: 'Smoke',
                    last_name: 'Check',
                    username: \`smoke_\${userId}\`,
                    language_code: 'en',
                  }));
                  const dataCheck = Array.from(params.entries())
                    .sort(([a], [b]) => a.localeCompare(b))
                    .map(([key, value]) => \`\${key}=\${value}\`)
                    .join('\\n');
                  const secretKey = crypto
                    .createHmac('sha256', 'WebAppData')
                    .update(process.env.TELEGRAM_BOT_TOKEN || '')
                    .digest();
                  const hash = crypto
                    .createHmac('sha256', secretKey)
                    .update(dataCheck)
                    .digest('hex');
                  params.set('hash', hash);

                  const response = await fetch('http://127.0.0.1:4000/auth/telegram', {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'X-Requested-With': 'XMLHttpRequest',
                    },
                    body: JSON.stringify({ initData: params.toString() }),
                  });

                  if (!response.ok) {
                    process.stderr.write(await response.text());
                    process.exit(1);
                  }

                  const payload = await response.json();
                  if (!payload?.token) {
                    process.stderr.write('Missing auth token from smoke auth response');
                    process.exit(1);
                  }

                  process.stdout.write(payload.token);
                })().catch((error) => {
                  process.stderr.write(String(error));
                  process.exit(1);
                });
NODE
              "
            )"
            test -n "$AUTH_TOKEN"
            echo "  ✓ api /auth/telegram"

            check_bearer() {
              local url=$1 expected=$2 token=$3 label=$4
              local code
              code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $token" "$url")
              if [ "$code" = "$expected" ]; then
                echo "  ✓ $label ($code)"
              else
                echo "  ✗ $label — expected $expected, got $code" && exit 1
              fi
            }

            check_bearer "$API/wallet/info" 200 "$AUTH_TOKEN" "api wallet info with auth"
            check_bearer "$API/v2/wallets" 200 "$AUTH_TOKEN" "api wallet-v2 list with auth"

            ADMIN_TOKEN="$(
              kubectl exec deployment/api -n $NS -- sh -lc "
                node - <<'NODE'
                const { signAuthToken } = require('./dist/lib/auth/jwt.js');
                const adminId = String(process.env.ADMIN_IDS || '').split(',').map(v => v.trim()).find(Boolean);
                if (!adminId) {
                  process.exit(1);
                }
                process.stdout.write(signAuthToken({
                  uid: \`telegram_\${adminId}\`,
                  telegramId: Number(adminId),
                  firstName: 'Admin',
                  lastName: 'Smoke',
                  username: 'admin_smoke',
                }));
NODE
              "
            )"

            check_bearer "$API/admin/db/stats" 200 "$ADMIN_TOKEN" "api admin db stats"
            check_bearer "$API/admin/story-boost/stats" 200 "$ADMIN_TOKEN" "api admin story boost stats"
            check_bearer "$API/admin/userbot/session" 200 "$ADMIN_TOKEN" "api admin userbot session"

            kubectl exec deployment/api -n $NS -- sh -lc '
              set -e
              code=$(curl -s -o /dev/null -w "%{http_code}" -H "x-internal-secret: $USERBOT_INTERNAL_SECRET" http://127.0.0.1:4000/v2/internal/pending-story-shares)
              [ "$code" = "200" ]
              code=$(curl -s -o /dev/null -w "%{http_code}" -H "x-internal-secret: $USERBOT_INTERNAL_SECRET" http://127.0.0.1:4000/v2/internal/active-story-shares)
              [ "$code" = "200" ]
            '
            echo "  ✓ api internal story-share endpoints"

            kubectl exec deployment/userbot -n $NS -- python - <<'PY'
            import json
            import urllib.request

            with urllib.request.urlopen("http://127.0.0.1:8095/health", timeout=10) as response:
                payload = json.load(response)

            assert payload.get("status") == "ok", payload
            print("  ✓ userbot /health", payload)
            PY

            kubectl exec deployment/web -n $NS -- sh -lc 'grep -R "https://api.nfttoys.shop" /app/.next >/dev/null'
            echo "  ✓ web bundle includes public API URL"

            echo "=== Deploy complete: $TAG ==="
