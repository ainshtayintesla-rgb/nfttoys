name: Build and Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allow manual trigger from GitHub UI or gh CLI

permissions:
  contents: read
  packages: write    # needed to push images to GHCR

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha-tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfttoys/api:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ github.repository_owner }}/nfttoys/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          target: runtime
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_BOT_USERNAME=${{ secrets.NEXT_PUBLIC_BOT_USERNAME }}
            NEXT_PUBLIC_ADMIN_IDS=${{ secrets.NEXT_PUBLIC_ADMIN_IDS }}
            NEXT_PUBLIC_TG_GROUP=${{ secrets.NEXT_PUBLIC_TG_GROUP }}
            NEXT_PUBLIC_TG_CHANNEL=${{ secrets.NEXT_PUBLIC_TG_CHANNEL }}
            TOKEN_SECRET=${{ secrets.TOKEN_SECRET }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfttoys/web:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ github.repository_owner }}/nfttoys/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Bot image
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          file: ./bot/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nfttoys/bot:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ github.repository_owner }}/nfttoys/bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Primary deploy: docker-compose (currently serving live traffic via nginx) ──
  deploy-compose:
    name: Deploy docker-compose (live traffic)
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            REPO="/root/my-works/nfttoys-pro"

            echo "=== Pulling latest code (main) ==="
            git -C "$REPO" pull --ff-only origin main

            echo "=== Rebuilding docker-compose images ==="
            docker compose -f "$REPO/docker-compose.yml" build api web bot

            echo "=== Restarting containers (zero-downtime rolling) ==="
            docker compose -f "$REPO/docker-compose.yml" up -d --no-deps api
            docker compose -f "$REPO/docker-compose.yml" up -d --no-deps web
            docker compose -f "$REPO/docker-compose.yml" up -d --no-deps bot

            echo "=== Verifying health ==="
            sleep 8
            docker compose -f "$REPO/docker-compose.yml" ps

            echo "=== Deploy complete ==="

  # ── Secondary deploy: k3s (will take over once postgres migration runs) ──
  deploy-k3s:
    name: Deploy k3s (staged rollout)
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            TAG="${{ needs.build-and-push.outputs.image-tag }}"
            OWNER="${{ github.repository_owner }}"
            NS="nfttoys-prod"
            REPO="/root/my-works/nfttoys-pro"

            echo "=== Applying k8s manifests ==="
            kubectl apply -f "$REPO/k8s/prod/"

            echo "=== Rolling update images to $TAG ==="
            kubectl set image deployment/api api=ghcr.io/${OWNER}/nfttoys/api:${TAG} -n $NS
            kubectl set image deployment/web web=ghcr.io/${OWNER}/nfttoys/web:${TAG} -n $NS
            kubectl set image deployment/bot bot=ghcr.io/${OWNER}/nfttoys/bot:${TAG} -n $NS

            echo "=== Waiting for rollout ==="
            kubectl rollout status deployment/web -n $NS --timeout=5m
            kubectl rollout status deployment/bot -n $NS --timeout=5m
            # API waits for postgres — skip blocking check until db migration runs
            kubectl rollout status deployment/api -n $NS --timeout=10m || \
              echo "WARNING: api rollout incomplete (postgres migration pending)"

            echo "=== k3s update complete: $TAG ==="
